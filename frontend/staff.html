<!DOCTYPE html>
<html>
<head>
    <title>Staff Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        .order {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
        }
    </style>
</head>
<body>

<h1>☕ Cafe Orders</h1>

<div id="orders"></div>


<script>

async function loadOrders() {

    const response = await fetch("https://cafe-ordering-system-j6sr.onrender.com/orders")

    const orders = await response.json();

console.log(orders);

if (!Array.isArray(orders)) {
    console.error("Orders is not an array", orders);
    return;
}

    const container =
        document.getElementById("orders");

    container.innerHTML = "";

    orders.forEach(order => {

if (order.status === "Ready") {
    return;
}

        let itemsHtml = "";
let total = 0;

order.items.forEach(item => {

if (typeof item === "string") {

    itemsHtml += `
        <p>${item}</p>
    `;

    return;
}

const itemTotal =
    item.price * item.quantity;

total += itemTotal;

itemsHtml += `
    <p>
        ${item.name}
        x${item.quantity}
        = ₹${itemTotal}
    </p>
`;
});

container.innerHTML += `
    <div class="order">

        <h2>🪑 Table ${order.table}</h2>

        <p>
            <strong>Status:</strong>
            ${order.status}
        </p>

        <hr>

        ${itemsHtml}

        <hr>

        <h3>Total: ₹${total}</h3>

        <button onclick="updateStatus(${order.id}, 'Preparing')">
            Preparing
        </button>

        <button onclick="updateStatus(${order.id}, 'Ready')">
            Ready
        </button>

    </div>
`;    

    });
}
;

async function updateStatus(id, status) {

await fetch(`https://cafe-ordering-system-j6sr.onrender.com/orders/${id}`, {
    method: "PUT",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify({
        status: status
    })
});

loadOrders();
}

loadOrders();

setInterval(loadOrders, 3000);

</script>

</body>
</html>
