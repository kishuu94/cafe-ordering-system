<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cafe Menu</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" href="path/to/your-icon.png">
    
</head>

<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand fs-3 fw-bold" href="#">☕ The Daily Grind</a>
            
            <div class="d-flex ms-auto w-50 justify-content-end align-items-center">
                <input type="text" id="searchInput" class="form-control rounded-pill me-3 shadow-sm w-75" placeholder="Search menu..." onkeyup="filterMenu()">
            </div>
        </div>
    </nav>

    <div class="container py-5">
        
        <div class="row mb-5 justify-content-center">
            <div class="col-md-6 text-center">
                <div class="p-4 bg-white rounded-4 shadow-sm border border-light">
                    <h5 class="mb-3">Welcome! Let's get started.</h5>
                    <input type="number" id="tableNumber" class="form-control form-control-lg text-center rounded-pill mx-auto" placeholder="Enter Table Number" style="max-width: 250px;">
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center mb-4 gap-2">
            <button class="btn btn-outline-dark rounded-pill active-filter" onclick="filterMenu('All')">All</button>
            <button class="btn btn-outline-dark rounded-pill" onclick="filterMenu('Coffee')">Coffee</button>
            <button class="btn btn-outline-dark rounded-pill" onclick="filterMenu('Food')">Food</button>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4" id="menu">
            </div>
    </div>

    <button class="floating-cart d-flex align-items-center" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
        <span>🛒 Cart</span>
        <span id="cartCount" class="cart-badge">0</span>
    </button>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
        <div class="offcanvas-header border-bottom bg-light">
            <h2 class="offcanvas-title" id="cartOffcanvasLabel">Your Order</h2>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            
            <div id="cart" class="flex-grow-1 overflow-auto mb-3"></div>
            
            <div class="mt-auto pt-3 border-top">
                <button id="placeOrderBtn" class="btn btn-cafe w-100 py-3 fs-5" onclick="placeOrder()">
                    Place Order
                </button>
                <div id="bill"></div>
            </div>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
        <div id="appToast" class="toast align-items-center border-0 shadow" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-bold fs-6" id="toastMessage"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div> 

    <script src="./js/cafe.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
